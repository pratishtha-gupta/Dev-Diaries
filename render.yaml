services:
  - type: web
    name: dev-diaries
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      # MongoDB connection string (e.g. from MongoDB Atlas). Set in the Render dashboard.
      - key: MONGO
        sync: false
      # Secret used to sign JWT auth tokens. Auto-generated by Render.
      - key: JWT_SECRET
        generateValue: true
      # Firebase Web config (needed at build time for image uploads + Google sign-in).
      # Copy these from your Firebase project's Web App config.
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
